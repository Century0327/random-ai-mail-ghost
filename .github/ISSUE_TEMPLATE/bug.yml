name: 🐛 Bug Report
about: 报告一个 Bug
title: "[Bug] "
labels: ["bug"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        感谢报告 Bug！请尽量填写以下信息，帮助我们快速定位问题。

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 清晰简洁地描述 Bug
      placeholder: 发生了什么？
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 如何复现这个问题？
      placeholder: |
        1. 打开...
        2. 点击...
        3. 看到错误...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 预期行为
      description: 你期望发生什么？
      placeholder: 应该显示...

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 实际发生了什么？
      placeholder: 实际显示...

  - type: input
    id: version
    attributes:
      label: 版本号
      description: 你使用的版本
      placeholder: "v1.0.0"

  - type: dropdown
    id: platform
    attributes:
      label: 平台
      options:
        - Windows
        - macOS
        - Linux
        - Web (浏览器)
        - 后端 API
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 日志或截图
      description: 如有错误日志或截图请贴在这里
      render: shell
