name: Test & Lint

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax check
        run: |
          python -m py_compile main.py
          python -m py_compile app.py
          python -m py_compile config.py
          python -m py_compile generate_schedule.py
          for f in core/*.py; do python -m py_compile "$f"; done
          python -m py_compile db/init_db.py

      - name: Unit tests
        run: python tests/test_basic.py
