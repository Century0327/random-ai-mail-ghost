name: Ghost AI Mail v2.0

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      force_send:
        description: '强制发送（忽略调度检查）'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      attachment_mode:
        description: '附件模式'
        required: false
        default: 'normal'
        type: choice
        options:
          - normal
          - force_on
          - force_off

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Ghost Sender
        env:
          QQ_EMAIL: ${{ secrets.QQ_EMAIL }}
          QQ_AUTH_CODE: ${{ secrets.QQ_AUTH_CODE }}
          TO_EMAIL_1: ${{ secrets.TO_EMAIL_1 }}
          AI_API_KEY1: ${{ secrets.AI_API_KEY1 || secrets.AI_API_KEY_1 }}
          AI_API_KEY2: ${{ secrets.AI_API_KEY2 || secrets.AI_API_KEY_2 }}
          AI_API_KEY3: ${{ secrets.AI_API_KEY3 || secrets.AI_API_KEY_3 }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          CONVERSATION_KEY: ${{ secrets.CONVERSATION_KEY }}
          FORCE_SEND: ${{ inputs.force_send || 'false' }}
          ATTACHMENT_MODE: ${{ inputs.attachment_mode || 'normal' }}
        run: python main.py

      - name: Commit state & history & data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json history.json 2>/dev/null || true
          git add conversation_*.enc 2>/dev/null || true
          git add data/ 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: update state, history & data [skip ci]"
          git push
