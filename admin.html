<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ghost Mail 配置管理</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
    --primary: #6366f1;
    --primary-dark: #4f46e5;
    --bg: #0f172a;
    --card-bg: #1e293b;
    --border: #334155;
    --text: #f8fafc;
    --text-muted: #94a3b8;
    --success: #22c55e;
    --warning: #f59e0b;
    --danger: #ef4444;
}
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
}
.header {
    background: rgba(30, 41, 59, 0.8);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.header h1 {
    font-size: 20px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 10px;
}
.header h1::before {
    content: '👻';
    font-size: 24px;
}
.header .actions {
    display: flex;
    gap: 10px;
}
.btn {
    padding: 8px 16px;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
}
.btn-primary {
    background: var(--primary);
    color: white;
}
.btn-primary:hover {
    background: var(--primary-dark);
}
.btn-secondary {
    background: var(--card-bg);
    color: var(--text);
    border: 1px solid var(--border);
}
.btn-secondary:hover {
    background: var(--border);
}
.btn-danger {
    background: var(--danger);
    color: white;
}
.btn-danger:hover {
    background: #dc2626;
}
.container {
    padding: 24px;
    max-width: 1400px;
    margin: 0 auto;
}
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 20px;
}
.card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    cursor: grab;
    transition: all 0.2s;
    position: relative;
}
.card:hover {
    border-color: var(--primary);
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(99, 102, 241, 0.1);
}
.card.dragging {
    opacity: 0.5;
    transform: rotate(3deg);
    cursor: grabbing;
}
.card.over {
    border-color: var(--primary);
    border-style: dashed;
}
.card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
}
.card-header h3 {
    font-size: 16px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
}
.card-header .drag-handle {
    color: var(--text-muted);
    cursor: grab;
    padding: 4px;
    border-radius: 4px;
}
.card-header .drag-handle:hover {
    background: var(--border);
}
.form-group {
    margin-bottom: 14px;
}
.form-group label {
    display: block;
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 6px;
}
.form-group input[type="text"],
.form-group input[type="number"],
.form-group select,
.form-group textarea {
    width: 100%;
    padding: 10px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 14px;
    transition: border-color 0.2s;
}
.form-group input[type="text"]:focus,
.form-group input[type="number"]:focus,
.form-group select:focus,
.form-group textarea:focus {
    outline: none;
    border-color: var(--primary);
}
.form-group textarea {
    resize: vertical;
    min-height: 80px;
}
.form-group input[type="checkbox"] {
    width: 18px;
    height: 18px;
    cursor: pointer;
}
.form-group .hint {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 4px;
}
.form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}
.contacts-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
}
.contact-item {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
}
.contact-item input {
    flex: 1;
}
.contact-item .remove-btn {
    background: transparent;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 4px;
}
.contact-item .remove-btn:hover {
    color: var(--danger);
}
.add-contact-btn {
    width: 100%;
    padding: 10px;
    background: transparent;
    border: 1px dashed var(--border);
    border-radius: 6px;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 14px;
    transition: all 0.2s;
}
.add-contact-btn:hover {
    border-color: var(--primary);
    color: var(--primary);
}
.status-bar {
    position: fixed;
    bottom: 20px;
    right: 20px;
    padding: 12px 20px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    display: none;
    align-items: center;
    gap: 8px;
    z-index: 1000;
}
.status-bar.success {
    border-color: var(--success);
    color: var(--success);
}
.status-bar.error {
    border-color: var(--danger);
    color: var(--danger);
}
.status-bar.show {
    display: flex;
}
@media (max-width: 768px) {
    .grid {
        grid-template-columns: 1fr;
    }
    .form-row {
        grid-template-columns: 1fr;
    }
}
</style>
</head>
<body>
<div class="header">
    <h1>Ghost Mail 配置管理</h1>
    <div class="actions">
        <button class="btn btn-secondary" onclick="loadConfig()">📥 刷新</button>
        <button class="btn btn-primary" onclick="saveConfig()">💾 保存配置</button>
    </div>
</div>

<div class="container">
    <div class="grid" id="cardsGrid">
        <div class="card" data-section="persona" draggable="true">
            <div class="card-header">
                <h3>🧑‍🎨 人设配置</h3>
                <span class="drag-handle">⋮⋮</span>
            </div>
            <div class="form-group">
                <label>人设名称</label>
                <select id="personaSelect">
                    <option value="default">default（默认温柔）</option>
                    <option value="maodie">maodie（圆头耄耋）</option>
                </select>
                <div class="hint">选择当前使用的人设（personas/ 目录下的 .md 文件）</div>
            </div>
            <div class="form-group">
                <label>邮件模板</label>
                <select id="templateSelect">
                    <option value="default">default（简洁白）</option>
                    <option value="cat">cat（猫猫风格）</option>
                    <option value="dark">dark（深色）</option>
                </select>
                <div class="hint">选择邮件样式模板（templates/ 目录下的 .html 文件）</div>
            </div>
        </div>

        <div class="card" data-section="contacts" draggable="true">
            <div class="card-header">
                <h3>👥 联系人配置</h3>
                <span class="drag-handle">⋮⋮</span>
            </div>
            <div class="contacts-list" id="contactsList">
                <div class="contact-item">
                    <input type="text" class="contact-name" placeholder="称呼" value="小令狐">
                    <input type="text" class="contact-env" placeholder="环境变量名" value="TO_EMAIL_1">
                    <button class="remove-btn" onclick="removeContact(this)">✕</button>
                </div>
                <div class="contact-item">
                    <input type="text" class="contact-name" placeholder="称呼" value="鼠鼠">
                    <input type="text" class="contact-env" placeholder="环境变量名" value="TO_EMAIL_2">
                    <button class="remove-btn" onclick="removeContact(this)">✕</button>
                </div>
            </div>
            <button class="add-contact-btn" onclick="addContact()">+ 添加联系人</button>
            <div class="hint">联系人邮箱地址需在 GitHub Secrets 中配置（如 TO_EMAIL_1: xxx@qq.com）</div>
        </div>

        <div class="card" data-section="mail" draggable="true">
            <div class="card-header">
                <h3>📧 邮件配置</h3>
                <span class="drag-handle">⋮⋮</span>
            </div>
            <div class="form-group">
                <label>邮件主题</label>
                <input type="text" id="subjectPrefix" placeholder="【苏狐来信】" value="【耄耋来信】">
            </div>
            <div class="form-group">
                <label>署名</label>
                <input type="text" id="signature" placeholder="Ghost" value="耄耋">
                <div class="hint">邮件正文末尾的署名，为空则不显示</div>
            </div>
            <div class="form-group">
                <label>页脚链接文字</label>
                <input type="text" id="footerText" value="— From Ghost Mail">
            </div>
        </div>

        <div class="card" data-section="schedule" draggable="true">
            <div class="card-header">
                <h3>⏰ 发送时间配置</h3>
                <span class="drag-handle">⋮⋮</span>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>最小间隔（天）</label>
                    <input type="number" id="minDays" value="0" min="0">
                </div>
                <div class="form-group">
                    <label>最大间隔（天）</label>
                    <input type="number" id="maxDays" value="3" min="0">
                </div>
            </div>
            <div class="form-group">
                <label>API 重试次数</label>
                <input type="number" id="maxRetries" value="2" min="0">
            </div>
        </div>

        <div class="card" data-section="conversation" draggable="true">
            <div class="card-header">
                <h3>💬 连续对话配置</h3>
                <span class="drag-handle">⋮⋮</span>
            </div>
            <div class="form-group">
                <label>
                    <input type="checkbox" id="enableConversation" checked> 开启连续对话
                </label>
                <div class="hint">开启后 Ghost 会记住上次发送内容和用户回复</div>
            </div>
            <div class="form-group">
                <label>对话历史文件</label>
                <input type="text" id="conversationFile" value="conversation.enc">
                <div class="hint">加密后的对话历史文件路径</div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>完整历史轮数</label>
                    <input type="number" id="fullHistorySize" value="1" min="1">
                </div>
                <div class="form-group">
                    <label>触发压缩阈值</label>
                    <input type="number" id="summaryTrigger" value="5" min="1">
                </div>
            </div>
            <div class="form-group">
                <label>摘要最大长度</label>
                <input type="number" id="summaryMaxLength" value="200" min="10">
            </div>
        </div>

        <div class="card" data-section="preview" draggable="true">
            <div class="card-header">
                <h3>👁️ 配置预览</h3>
                <span class="drag-handle">⋮⋮</span>
            </div>
            <pre id="configPreview" style="background: var(--bg); padding: 12px; border-radius: 6px; font-size: 12px; overflow-x: auto; color: var(--text-muted);"></pre>
        </div>
    </div>
</div>

<div class="status-bar" id="statusBar"></div>

<script>
const cardsGrid = document.getElementById('cardsGrid');
const cards = Array.from(cardsGrid.querySelectorAll('.card'));

cards.forEach(card => {
    card.addEventListener('dragstart', dragStart);
    card.addEventListener('dragend', dragEnd);
    card.addEventListener('dragover', dragOver);
    card.addEventListener('dragenter', dragEnter);
    card.addEventListener('dragleave', dragLeave);
    card.addEventListener('drop', dragDrop);
});

function dragStart(e) {
    this.classList.add('dragging');
    e.dataTransfer.setData('text/plain', this.dataset.section);
}

function dragEnd(e) {
    this.classList.remove('dragging');
    cards.forEach(c => c.classList.remove('over'));
}

function dragOver(e) {
    e.preventDefault();
}

function dragEnter(e) {
    if (!this.classList.contains('dragging')) {
        this.classList.add('over');
    }
}

function dragLeave(e) {
    this.classList.remove('over');
}

function dragDrop(e) {
    e.preventDefault();
    this.classList.remove('over');
    const draggingCard = cardsGrid.querySelector('.dragging');
    if (draggingCard && draggingCard !== this) {
        const parent = draggingCard.parentNode;
        const nextSibling = this.nextSibling;
        if (nextSibling === draggingCard) {
            parent.insertBefore(draggingCard, this);
        } else {
            parent.insertBefore(draggingCard, nextSibling);
        }
    }
}

function addContact() {
    const list = document.getElementById('contactsList');
    const item = document.createElement('div');
    item.className = 'contact-item';
    item.innerHTML = `
        <input type="text" class="contact-name" placeholder="称呼">
        <input type="text" class="contact-env" placeholder="环境变量名" value="TO_EMAIL_${list.children.length + 1}">
        <button class="remove-btn" onclick="removeContact(this)">✕</button>
    `;
    list.appendChild(item);
}

function removeContact(btn) {
    const list = document.getElementById('contactsList');
    if (list.children.length > 1) {
        btn.parentElement.remove();
    } else {
        showStatus('至少保留一个联系人', 'error');
    }
}

async function loadConfig() {
    try {
        const resp = await fetch('/api/config');
        const data = await resp.json();
        if (data.success) {
            populateForm(data.config);
            showStatus('配置加载成功', 'success');
        }
    } catch (e) {
        showStatus('加载失败，请检查后端服务', 'error');
    }
}

function populateForm(config) {
    document.getElementById('personaSelect').value = config.PERSONA || '';
    document.getElementById('templateSelect').value = config.EMAIL_TEMPLATE || '';
    document.getElementById('subjectPrefix').value = config.SUBJECT_PREFIX || '';
    document.getElementById('signature').value = config.SIGNATURE || '';
    document.getElementById('footerText').value = config.FOOTER ? config.FOOTER.match(/>(.*?)</)?.[1] || '' : '';
    document.getElementById('minDays').value = config.MIN_DAYS || 0;
    document.getElementById('maxDays').value = config.MAX_DAYS || 3;
    document.getElementById('maxRetries').value = config.MAX_RETRIES || 2;
    document.getElementById('enableConversation').checked = config.ENABLE_CONVERSATION || false;
    document.getElementById('conversationFile').value = config.CONVERSATION_FILE || 'conversation.enc';
    document.getElementById('fullHistorySize').value = config.FULL_HISTORY_SIZE || 1;
    document.getElementById('summaryTrigger').value = config.SUMMARY_TRIGGER || 5;
    document.getElementById('summaryMaxLength').value = config.SUMMARY_MAX_LENGTH || 200;
    
    const contactsList = document.getElementById('contactsList');
    contactsList.innerHTML = '';
    (config.CONTACTS || []).forEach((c, i) => {
        const item = document.createElement('div');
        item.className = 'contact-item';
        item.innerHTML = `
            <input type="text" class="contact-name" placeholder="称呼" value="${c.name || ''}">
            <input type="text" class="contact-env" placeholder="环境变量名" value="${c.email_env || `TO_EMAIL_${i+1}`}">
            <button class="remove-btn" onclick="removeContact(this)">✕</button>
        `;
        contactsList.appendChild(item);
    });
    updatePreview();
}

async function saveConfig() {
    const config = collectFormData();
    try {
        const resp = await fetch('/api/config', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ config })
        });
        const data = await resp.json();
        if (data.success) {
            showStatus('配置保存成功', 'success');
            updatePreview();
        } else {
            showStatus(data.error || '保存失败', 'error');
        }
    } catch (e) {
        showStatus('保存失败，请检查后端服务', 'error');
    }
}

function collectFormData() {
    const contacts = [];
    document.querySelectorAll('.contact-item').forEach(item => {
        const name = item.querySelector('.contact-name').value.trim();
        const env = item.querySelector('.contact-env').value.trim();
        if (name && env) {
            contacts.push({ name, email_env: env });
        }
    });
    
    const footerText = document.getElementById('footerText').value.trim();
    
    return {
        PERSONA: document.getElementById('personaSelect').value,
        EMAIL_TEMPLATE: document.getElementById('templateSelect').value,
        CONTACTS: contacts,
        SUBJECT_PREFIX: document.getElementById('subjectPrefix').value.trim(),
        SIGNATURE: document.getElementById('signature').value.trim(),
        FOOTER: footerText ? `<a href="https://github.com/Century0327/random-ai-mail-ghost" style="color:#999; text-decoration:none;">${footerText}</a>` : '',
        MIN_DAYS: parseInt(document.getElementById('minDays').value) || 0,
        MAX_DAYS: parseInt(document.getElementById('maxDays').value) || 3,
        MAX_RETRIES: parseInt(document.getElementById('maxRetries').value) || 2,
        ENABLE_CONVERSATION: document.getElementById('enableConversation').checked,
        CONVERSATION_FILE: document.getElementById('conversationFile').value.trim(),
        FULL_HISTORY_SIZE: parseInt(document.getElementById('fullHistorySize').value) || 1,
        SUMMARY_TRIGGER: parseInt(document.getElementById('summaryTrigger').value) || 5,
        SUMMARY_MAX_LENGTH: parseInt(document.getElementById('summaryMaxLength').value) || 200,
    };
}

function updatePreview() {
    const config = collectFormData();
    const preview = document.getElementById('configPreview');
    preview.textContent = JSON.stringify(config, null, 2);
}

function showStatus(msg, type) {
    const bar = document.getElementById('statusBar');
    bar.textContent = msg;
    bar.className = `status-bar ${type} show`;
    setTimeout(() => {
        bar.classList.remove('show');
    }, 3000);
}

document.addEventListener('input', updatePreview);

loadConfig();
</script>
</body>
</html>
